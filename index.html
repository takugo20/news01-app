<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ニュースダッシュボード</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">NEWS DASHBOARD</p>
      <h1>ニュースダッシュボード</h1>
      <p class="lead">日経平均・為替・宇都宮市の天気と、主要ニュースをまとめて表示します。</p>
    </div>
  </header>

  <main class="app-main">
    <section class="top-panel" aria-labelledby="top-panel-title">
      <div class="section-head">
        <div>
          <p class="eyebrow">TODAY</p>
          <h2 id="top-panel-title">今日の情報</h2>
        </div>
        <p id="topUpdated" class="updated-text">更新日時を読み込み中...</p>
      </div>

      <div id="topStatus" class="status-message">日経平均・為替・天気を読み込み中...</div>
      <div id="topCards" class="top-cards" aria-live="polite"></div>
    </section>

    <section class="news-panel" aria-labelledby="news-panel-title">
      <div class="section-head">
        <div>
          <p class="eyebrow">NEWS</p>
          <h2 id="news-panel-title">ニュース一覧</h2>
        </div>
        <p id="newsUpdated" class="updated-text">更新日時を読み込み中...</p>
      </div>

      <div class="controls">
        <label class="search-box">
          <span>キーワード検索</span>
          <input id="searchInput" type="search" placeholder="例：経済、AI、宇都宮" autocomplete="off" />
        </label>

        <div>
          <p class="control-label">カテゴリ</p>
          <div id="categoryButtons" class="category-buttons"></div>
        </div>
      </div>

      <div id="newsStatus" class="status-message">ニュースを読み込み中...</div>
      <div id="newsList" class="news-list" aria-live="polite"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>記事をタップすると、元サイトを新しいタブで開きます。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
